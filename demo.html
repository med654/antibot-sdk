<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AntiBot Check</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0d12; color: #cdd9e5; font-family: 'IBM Plex Mono', monospace; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
        #verdict-wrap { text-align: center; margin-bottom: 40px; }
        #verdict-icon { font-size: 96px; line-height: 1; margin-bottom: 16px; display: block; animation: pop 0.4s cubic-bezier(.175,.885,.32,1.275) both; }
        @keyframes pop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        #verdict-label { font-size: 52px; font-weight: 700; letter-spacing: -1px; }
        #verdict-action { font-size: 14px; margin-top: 8px; opacity: 0.5; letter-spacing: 2px; }
        #score-wrap { width: 100%; max-width: 480px; margin-bottom: 32px; }
        #score-top { display: flex; justify-content: space-between; font-size: 11px; opacity: 0.4; margin-bottom: 8px; }
        #score-bar-bg { height: 8px; background: rgba(255,255,255,0.07); border-radius: 4px; overflow: hidden; }
        #score-bar-fill { height: 100%; border-radius: 4px; transition: width 0.8s ease; width: 0%; }
        #score-num { text-align: center; font-size: 13px; margin-top: 8px; opacity: 0.5; }
        #response-wrap { width: 100%; max-width: 480px; }
        #response-label { font-size: 10px; letter-spacing: 2px; opacity: 0.3; margin-bottom: 8px; }
        #response-box { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; padding: 18px 20px; font-size: 12px; line-height: 1.8; direction: ltr; white-space: pre-wrap; word-break: break-all; }
        #loading { text-align: center; }
        .spinner { width: 48px; height: 48px; border: 3px solid rgba(255,255,255,0.07); border-top-color: #00ff88; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading p { font-size: 13px; opacity: 0.4; letter-spacing: 1px; }
        #result { display: none; width: 100%; max-width: 480px; flex-direction: column; align-items: center; }
        .j-key { color: #79c0ff; } .j-str { color: #a5d6ff; } .j-num { color: #f2cc60; } .j-bool { color: #ff7b72; } .j-null { color: #6e7681; }
    </style>
</head>
<body>

    <div id="loading">
        <div class="spinner"></div>
        <p>ANALYZING...</p>
    </div>

    <div id="result">
        <div id="verdict-wrap">
            <span id="verdict-icon"></span>
            <div id="verdict-label"></div>
            <div id="verdict-action"></div>
        </div>
        <div id="score-wrap">
            <div id="score-top"><span>RISK SCORE</span><span id="score-pct"></span></div>
            <div id="score-bar-bg"><div id="score-bar-fill"></div></div>
            <div id="score-num"></div>
        </div>
        <div id="response-wrap">
            <div id="response-label">SERVER RESPONSE</div>
            <div id="response-box"></div>
        </div>
    </div>

    <script>
        var API_KEY  = 'key';
        var ENDPOINT = 'https://antibot.prodtrackers.com/api/v1/detect';

        var map = {
            human:      { icon: 'вң…', label: 'HUMAN',      color: '#00ff88', bar: '#00ff88' },
            bot:        { icon: 'рҹӨ–', label: 'BOT',        color: '#ff3355', bar: '#ff3355' },
            suspicious: { icon: 'вҡ пёҸ', label: 'SUSPICIOUS', color: '#ffcc00', bar: '#ffcc00' },
            error:      { icon: 'вқҢ', label: 'ERROR',      color: '#8b949e', bar: '#8b949e' },
        };

        function show(result) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('result').style.display  = 'flex';
            var v     = result.verdict || 'error';
            var m     = map[v] || map.error;
            var score = result.risk_score || 0;
            document.getElementById('verdict-icon').textContent        = m.icon;
            document.getElementById('verdict-label').textContent       = m.label;
            document.getElementById('verdict-label').style.color       = m.color;
            document.getElementById('verdict-action').textContent      = (result.action || '').toUpperCase();
            document.getElementById('score-pct').textContent           = score + ' / 100';
            document.getElementById('score-num').textContent           = 'Risk Score: ' + score;
            document.getElementById('score-bar-fill').style.width      = score + '%';
            document.getElementById('score-bar-fill').style.background = m.bar;
            document.getElementById('score-bar-fill').style.boxShadow  = '0 0 10px ' + m.bar + '66';
            document.getElementById('response-box').innerHTML          = syntaxHighlight(JSON.stringify(result, null, 2));
        }

        function syntaxHighlight(json) {
            return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                .replace(/("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function(m) {
                    var cls = 'j-num';
                    if (/^"/.test(m))              cls = /:$/.test(m) ? 'j-key' : 'j-str';
                    else if (/true|false/.test(m)) cls = 'j-bool';
                    else if (/null/.test(m))        cls = 'j-null';
                    return '<span class="' + cls + '">' + m + '</span>';
                });
        }

        function run() {
            // Ш·ШЁШ§Ш№Ш© ЩғЩ„ Ш§Щ„ШҜЩҲШ§Щ„ Ш§Щ„Щ…ШӘШ§ШӯШ© ЩҒЩҠ Ш§Щ„ЩҖ SDK Щ„Щ„ШӘШҙШ®ЩҠШө
            console.log('AntiBot object:', window.AntiBot);
            console.log('AntiBot keys:', Object.keys(window.AntiBot || {}));

            var bot = window.AntiBot;

            if (!bot) {
                show({ verdict: 'error', risk_score: 0, action: 'unknown', error: 'AntiBot SDK not found' });
                return;
            }

            // patch fetch Щ„ШӘШөШӯЩҠШӯ Ш§Щ„ЩҖ endpoint
            var _orig = window.fetch;
            window.fetch = function(url, opts) {
                if (typeof url === 'string' && url.indexOf('/api/v1/detect') !== -1 && url.indexOf('prodtrackers') === -1) {
                    url = ENDPOINT;
                }
                return _orig(url, opts);
            };

            // Ш¬ШұШЁ ЩғЩ„ Ш§Щ„Ш·ШұЩӮ Ш§Щ„Щ…Щ…ЩғЩҶШ©
            if (typeof bot.submit === 'function') {
                bot.submit(API_KEY, function(err, result) {
                    window.fetch = _orig;
                    if (err) show({ verdict: 'error', risk_score: 0, action: 'unknown', error: err.message });
                    else show(result);
                });

            } else if (typeof bot.detect === 'function') {
                bot.init({ apiKey: API_KEY, endpoint: ENDPOINT });
                bot.detect()
                    .then(function(r) { window.fetch = _orig; show(r); })
                    .catch(function(e) { window.fetch = _orig; show({ verdict: 'error', risk_score: 0, action: 'unknown', error: e.message }); });

            } else if (typeof bot.isHuman === 'function') {
                bot.isHuman(API_KEY)
                    .then(function(human) { window.fetch = _orig; show({ verdict: human ? 'human' : 'bot', risk_score: human ? 10 : 90, action: human ? 'allow' : 'block' }); })
                    .catch(function(e) { window.fetch = _orig; show({ verdict: 'error', risk_score: 0, action: 'unknown', error: e.message }); });

            } else {
                // ШҘШұШіШ§Щ„ Щ…ШЁШ§ШҙШұ ШЁШҜЩҲЩҶ SDK
                window.fetch = _orig;
                var d = bot.getData ? bot.getData() : { fingerprint: bot.data && bot.data.fingerprint, behavior: bot.data && bot.data.behavior };
                fetch(ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY },
                    body: JSON.stringify(d)
                })
                .then(function(r) { return r.json(); })
                .then(show)
                .catch(function(e) { show({ verdict: 'error', risk_score: 0, action: 'unknown', error: e.message }); });
            }
        }

        // ШӘШӯЩ…ЩҠЩ„ SDK Ш«Щ… run
        var s    = document.createElement('script');
        s.src    = 'https://cdn.jsdelivr.net/gh/med654/antibot-sdk@latest/antibot.min.js';
        s.onload = run;
        s.onerror = function() {
            show({ verdict: 'error', risk_score: 0, action: 'unknown', error: 'Failed to load SDK' });
        };
        document.head.appendChild(s);
    </script>

</body>
</html>
